name: Update Audit Registry

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at 00:00 UTC
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main
    paths:
      - "README.md"

jobs:
  update-registry:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate audit registry
        run: python src/scripts/generate_audit_registry.py

      - name: Verify changes
        run: |
          echo "Checking for changes in data files..."
          git status

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/audits/audit_registry.json data/audits/Main_Database.db
          git commit -m "Updated audit registry from README" || echo "No changes to commit."
          git push || echo "Push failed or nothing to push."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
